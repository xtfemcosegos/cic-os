<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Control Operativo | CIC-OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Fuente principal Open Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Aplicación global de la fuente Open Sans */
        * {
            font-family: 'Open Sans', sans-serif;
        }
        /* Color perla personalizado con un sutil degradado sedoso */
        .bg-pearl {
            background: linear-gradient(135deg, #FAF9F6 0%, #F4F3EE 100%);
        }
        /* Animación fluida para el panel de navegación lateral */
        .drawer-transition {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .app-card:hover {
            transform: translateX(4px);
            border-color: rgba(153, 27, 27, 0.3);
        }
    </style>
</head>
<body class="bg-stone-100 text-stone-950 h-screen flex flex-col font-sans selection:bg-red-800 selection:text-white overflow-hidden">

    <!-- ENCABEZADO COMPACTO COLOR PERLA CON DETALLES ROJOS Y ANCHO AL 100% -->
    <header class="bg-pearl border-b-[0.5px] border-red-800/25 shadow-sm px-6 py-2 sticky top-0 z-40 w-full">
        <div class="w-full flex items-center justify-between">
            
            <!-- SECCIÓN IZQUIERDA: ICONO SISTEMA (TRIGGER DE DRAWER) Y DETALLES DEL OPERADOR -->
            <div class="flex items-center gap-5 relative">
                <div class="relative group">
                    <!-- Icono del sistema - Ahora abre/cierra el Drawer de Aplicaciones al dar clic -->
                    <div onclick="toggleDrawer()" class="cursor-pointer w-14 h-14 bg-white rounded-xl shadow-sm border-[0.5px] border-red-800/15 flex items-center justify-center overflow-hidden hover:scale-105 transition-all" title="Ver Aplicaciones">
                        <img src="../ico/cic.ico" alt="SISTEMA" class="w-10 h-10 object-contain" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23991b1b%22><path d=%22M12 2L2 22h20L12 2zm0 3.99L19.53 19H4.47L12 5.99z%22/></svg>'">
                    </div>
                    <!-- Mini botón hamburguesa abajo a la derecha (SOLO COMO REFERENCIA VISUAL) -->
                    <div class="absolute -bottom-1.5 -right-1.5 bg-red-800 text-white w-6 h-6 rounded-md shadow border-[0.5px] border-red-950/40 flex items-center justify-center pointer-events-none">
                        <i class="fa-solid fa-bars text-[10px]"></i>
                    </div>
                </div>
                
                <!-- Separador vertical extra fino -->
                <div class="h-10 w-[0.5px] bg-red-800/15 hidden md:block"></div>
                
                <!-- Identificación del Operador (Nombre destacado, Puesto de subtítulo) -->
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 rounded-full border-[0.5px] border-red-800/40 overflow-hidden bg-white shadow-sm flex items-center justify-center">
                        <img id="operator-img" src="https://api.dicebear.com/7.x/adventurer/svg?seed=cicos" alt="Elemento" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://api.dicebear.com/7.x/adventurer/svg?seed=cicos'">
                    </div>
                    <div class="flex flex-col">
                        <div id="operator-name" class="text-sm md:text-base font-black text-stone-850 leading-tight">Espere un momento...</div>
                        <div id="operator-puesto" class="text-[10px] md:text-xs text-stone-500 font-bold uppercase tracking-wider leading-none mt-0.5">Cargando...</div>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN DERECHA: RELOJ, FECHA, CLIMA Y SALIDA -->
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <!-- Reloj Elegante -->
                    <div id="digital-clock" class="text-xl md:text-2xl font-black text-stone-900 leading-none tracking-tight">00:00:00</div>
                    <!-- Fecha -->
                    <div id="calendar-date" class="text-[10px] md:text-xs text-stone-500 font-bold uppercase tracking-wider mt-0.5">Cargando fecha...</div>
                </div>
                
                <!-- Separador extra fino -->
                <div class="h-10 w-[0.5px] bg-red-800/15"></div>

                <!-- Widget de Clima Real con bordes finos -->
                <div id="weather-widget" class="flex items-center gap-2 bg-white/70 px-3 py-1.5 rounded-lg border-[0.5px] border-red-800/10 shadow-sm min-w-[90px] justify-center">
                    <span id="weather-icon" class="text-red-800 text-lg animate-pulse"><i class="fa-solid fa-spinner animate-spin"></i></span>
                    <div>
                        <div id="weather-temp" class="text-sm font-extrabold text-stone-800 leading-none">--°C</div>
                        <div id="weather-desc" class="text-[9px] text-stone-500 font-bold uppercase leading-none mt-0.5">Buscando...</div>
                    </div>
                </div>

                <!-- Botón de Cerrar Sesión -->
                <button onclick="handleLogout()" class="bg-red-800 hover:bg-red-900 text-white px-3 py-2 rounded-lg text-xs font-bold transition flex items-center gap-1 border-[0.5px] border-red-950/20" title="Cerrar Sesión">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>

        </div>
    </header>

    <!-- ÁREA DE CONTENIDO OPERATIVO PRINCIPAL (CONTENEDOR MULTI-IFRAME) -->
    <main id="iframe-container" class="flex-1 w-full relative bg-stone-100">
        <!-- Iframe Inicial por Defecto (Inicio) -->
        <iframe id="iframe-inicio" src="../secciones/mods/cco/inicio.html" class="absolute inset-0 w-full h-full border-none z-10"></iframe>
    </main>

    <!-- MENÚ LATERAL DESLIZABLE (DRAWER) DE APLICACIONES EN FORMATO LISTA CON CABECERA PERLA -->
    <div id="drawer-overlay" onclick="toggleDrawer(false)" class="fixed inset-0 bg-black/60 z-50 opacity-0 pointer-events-none transition-opacity duration-300"></div>
    
    <aside id="drawer" class="fixed top-0 left-0 h-full w-80 md:w-96 bg-pearl border-r-[0.5px] border-red-800/20 z-50 transform -translate-x-full drawer-transition flex flex-col shadow-2xl">
        
        <!-- Cabecera del Drawer -->
        <div class="p-5 border-b-[0.5px] border-red-800/15 bg-pearl text-stone-900 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-cubes-stacked text-xl text-red-800 animate-pulse"></i>
                <h3 class="font-black text-lg tracking-wide uppercase text-stone-850">Consola de Aplicaciones</h3>
            </div>
            <button onclick="toggleDrawer(false)" class="text-stone-500 hover:text-red-800 hover:scale-110 transition-transform">
                <i class="fa-solid fa-circle-xmark text-2xl"></i>
            </button>
        </div>

        <!-- Contenedor de la lista de aplicaciones -->
        <div class="flex-1 overflow-y-auto p-5 space-y-4">
            <div class="text-xs text-stone-550 font-bold uppercase tracking-wider mb-2">Aplicaciones Disponibles</div>
            
            <!-- LISTA VERTICAL DE APLICACIONES -->
            <div id="apps-grid" class="flex flex-col gap-2">
                <div class="py-8 text-center text-stone-500 text-xs">
                    <i class="fa-solid fa-spinner animate-spin text-red-800 text-xl mb-2 block"></i>
                    Buscando aplicaciones en CIC-OS...
                </div>
            </div>
        </div>

        <!-- Pie de página del Drawer con bordes finos -->
        <div class="p-4 bg-stone-100 border-t-[0.5px] border-stone-200 text-center text-[10px] text-stone-500 font-bold tracking-wider uppercase">
            CIC-OS • Sistema de Módulos
        </div>
    </aside>

    <script type="module">
        // Importamos módulos esenciales y la configuración de Firebase
        import { firebaseConfig, initializeApp, getAuth, onAuthStateChanged, getDatabase, ref, get, getStorage, storageRef, getDownloadURL, signOut } from "../config.js";
        import { fetchApps } from "../config.js";

        // Inicializamos las instancias requeridas
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // --- GESTIÓN DE CACHÉ DE FOTOS CON INDEXEDDB ---
        const DB_NAME = "cache_fotos";
        const STORE_NAME = "ElementosPP";

        // Registramos un manejador de error de iconos globalmente en window para un fallback de imagen infalible
        window.handleIconError = (imgEl) => {
            imgEl.outerHTML = '<i class="fa-solid fa-cube text-white text-base"></i>';
        };

        function getCachedPhoto(id) {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        resolve(null);
                        return;
                    }
                    const tx = db.transaction(STORE_NAME, "readonly");
                    const store = tx.objectStore(STORE_NAME);
                    const getReq = store.get(id);
                    getReq.onsuccess = () => resolve(getReq.result || null);
                    getReq.onerror = () => resolve(null);
                };
                request.onerror = () => resolve(null);
            });
        }

        function saveCachedPhoto(id, base64) {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => {
                    const db = e.target.result;
                    const tx = db.transaction(STORE_NAME, "readwrite");
                    const store = tx.objectStore(STORE_NAME);
                    store.put(base64, id);
                    tx.oncomplete = () => resolve();
                };
            });
        }

        async function fetchAndConvertToBase64(url) {
            const response = await fetch(url);
            const blob = await response.blob();
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // Actualizamos estatus visual de la RTDB si el elemento existe en el DOM (Validación de seguridad)
                    const rtdbStatus = document.getElementById('rtdb-status');
                    if (rtdbStatus) {
                        rtdbStatus.innerHTML = '<span class="text-green-600 font-bold"><i class="fa-solid fa-circle-check"></i> En línea</span>';
                    }
                    
                    const uid = user.uid;
                    // Descargamos toda la rama del usuario de forma eficiente
                    const userRef = ref(db, `usuarios/${uid}`);
                    const snapshot = await get(userRef);

                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        const nombre = userData.nombre || "Elemento Sin Nombre";
                        const puesto = userData.puesto || "Operador Activo";
                        const idElemento = userData.ID || "";

                        // Inyectamos datos en el DOM (Nombre arriba destacado, Puesto de subtítulo)
                        document.getElementById('operator-name').innerText = nombre;
                        document.getElementById('operator-puesto').innerText = puesto;

                        // Si tiene ID, manejamos la imagen con IndexedDB
                        if (idElemento) {
                            try {
                                // 1. Buscar en IndexedDB primero
                                const cachedPhoto = await getCachedPhoto(idElemento);
                                if (cachedPhoto) {
                                    document.getElementById('operator-img').src = cachedPhoto;
                                } else {
                                    // 2. Si no existe, descargar de Storage
                                    const pathInStorage = `Fotos/ElementosPP/${idElemento}.webp`;
                                    const imgRef = storageRef(storage, pathInStorage);
                                    const downloadUrl = await getDownloadURL(imgRef);
                                    
                                    // Convertir a Base64 y guardar en IndexedDB
                                    const base64Photo = await fetchAndConvertToBase64(downloadUrl);
                                    await saveCachedPhoto(idElemento, base64Photo);
                                    
                                    document.getElementById('operator-img').src = base64Photo;
                                }
                            } catch (errorImage) {
                                console.warn("La foto del elemento no pudo ser procesada, usando fallback:", errorImage);
                                document.getElementById('operator-img').src = `https://api.dicebear.com/7.x/adventurer/svg?seed=${idElemento}`;
                            }
                        }
                    } else {
                        // En caso de que se loguee un usuario sin nodo creado en RTDB
                        document.getElementById('operator-name').innerText = "Usuario Desconocido";
                        document.getElementById('operator-puesto').innerText = "Sin Perfil Asignado";
                    }
                } catch (error) {
                    console.error("Error al obtener perfil de operador:", error);
                }

                // Cargar aplicaciones asociadas desde el nodo /apps
                await fetchApps();

                // RESTAURACIÓN AUTOMÁTICA DEL ÚLTIMO IFRAME ABIERTO
                const lastIframeId = localStorage.getItem('cicos_last_iframe_id');
                const lastIframeRoute = localStorage.getItem('cicos_last_iframe_route');

                if (lastIframeId && lastIframeRoute && lastIframeId !== 'inicio') {
                    // Si recordamos un iframe activo, lo levantamos directamente
                    window.showIframe(lastIframeId, lastIframeRoute);
                } else {
                    // En caso contrario, aseguramos que muestre el inicial de forma limpia
                    window.showIframe('inicio', '../secciones/mods/cco/inicio.html');
                }

            } else {
                // Redirección forzada si no hay sesión iniciada.
                // Reseteamos el estado guardado del iframe para que no cause conflictos en el próximo inicio.
                localStorage.setItem('cicos_last_iframe_id', 'inicio');
                localStorage.setItem('cicos_last_iframe_route', '../secciones/mods/cco/inicio.html');
                window.location.href = "../login.html";
            }
        });

        // Cerrar sesión
        window.handleLogout = async () => {
            try {
                // Al cerrar sesión de manera manual, forzamos que el próximo login empiece en el index/inicio
                localStorage.setItem('cicos_last_iframe_id', 'inicio');
                localStorage.setItem('cicos_last_iframe_route', '../secciones/mods/cco/inicio.html');
                await signOut(auth);
                window.location.href = "../index.html";
            } catch (error) {
                console.error("Error al cerrar sesión:", error);
            }
        };

        // Función del Reloj y Fecha Operativa
        function initClock() {
            const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            
            setInterval(() => {
                const now = new Date();
                const hrs = String(now.getHours()).padStart(2, '0');
                const mins = String(now.getMinutes()).padStart(2, '0');
                const secs = String(now.getSeconds()).padStart(2, '0');
                
                document.getElementById('digital-clock').innerText = `${hrs}:${mins}:${secs}`;
                
                const dayName = days[now.getDay()];
                const dayNum = now.getDate();
                const monthName = months[now.getMonth()];
                const year = now.getFullYear();
                
                document.getElementById('calendar-date').innerText = `${dayName}, ${dayNum} ${monthName} ${year}`;
            }, 1000);
        }

        // Función de clima real usando Open-Meteo API basada en la localización del dispositivo
        async function fetchWeather() {
            const fallbackLat = 25.6866; // Monterrey, NL por defecto
            const fallbackLon = -100.3161;
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const { latitude, longitude } = position.coords;
                        await updateWeatherWidget(latitude, longitude);
                    },
                    async () => {
                        await updateWeatherWidget(fallbackLat, fallbackLon, "Predeterminado");
                    }
                );
            } else {
                await updateWeatherWidget(fallbackLat, fallbackLon, "Predeterminado");
            }
        }

        async function updateWeatherWidget(lat, lon, label = "") {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                
                // Mapear el código del clima de WMO a un icono y descripción
                const weatherMap = {
                    0: { icon: 'fa-sun', desc: 'Despejado' },
                    1: { icon: 'fa-cloud-sun', desc: 'Parc. Nublado' },
                    2: { icon: 'fa-cloud-sun', desc: 'Parc. Nublado' },
                    3: { icon: 'fa-cloud', desc: 'Nublado' },
                    45: { icon: 'fa-smog', desc: 'Niebla' },
                    48: { icon: 'fa-smog', desc: 'Niebla' },
                    51: { icon: 'fa-cloud-rain', desc: 'Llovizna' },
                    53: { icon: 'fa-cloud-rain', desc: 'Llovizna' },
                    55: { icon: 'fa-cloud-rain', desc: 'Llovizna' },
                    61: { icon: 'fa-cloud-showers-heavy', desc: 'Lluvia' },
                    63: { icon: 'fa-cloud-showers-heavy', desc: 'Lluvia' },
                    65: { icon: 'fa-cloud-showers-heavy', desc: 'Lluvia Fuerte' },
                    71: { icon: 'fa-snowflake', desc: 'Nieve' },
                    73: { icon: 'fa-snowflake', desc: 'Nieve' },
                    75: { icon: 'fa-snowflake', desc: 'Nieve' },
                    80: { icon: 'fa-cloud-showers-water', desc: 'Chubascos' },
                    81: { icon: 'fa-cloud-showers-water', desc: 'Chubascos' },
                    82: { icon: 'fa-cloud-showers-water', desc: 'Chubascos' },
                    95: { icon: 'fa-cloud-bolt', desc: 'Tormenta' }
                };

                const mapped = weatherMap[code] || { icon: 'fa-cloud-sun', desc: 'Variado' };
                
                document.getElementById('weather-temp').innerText = `${temp}°C`;
                document.getElementById('weather-desc').innerText = label ? `${mapped.desc} (${label})` : mapped.desc;
                document.getElementById('weather-icon').innerHTML = `<i class="fa-solid ${mapped.icon}"></i>`;
            } catch (err) {
                document.getElementById('weather-temp').innerText = "N/A";
                document.getElementById('weather-desc').innerText = "Error";
                document.getElementById('weather-icon').innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i>`;
            }
        }

        // --- GESTIÓN DE NAVEGACIÓN MULTI-IFRAME PERSISTENTE ---
        window.showIframe = (id, finalRoute) => {
            const container = document.getElementById('iframe-container');
            const iframes = container.querySelectorAll('iframe');
            
            // Ocultar todos los iframes actuales sin destruirlos para conservar estados
            iframes.forEach(frame => {
                frame.classList.add('hidden');
            });

            if (id === 'inicio') {
                const inicioFrame = document.getElementById('iframe-inicio');
                inicioFrame.classList.remove('hidden');
            } else {
                let targetFrame = document.getElementById(`iframe-app-${id}`);
                if (!targetFrame) {
                    // Si no existe, creamos su propio iframe dinámicamente
                    targetFrame = document.createElement('iframe');
                    targetFrame.id = `iframe-app-${id}`;
                    targetFrame.src = finalRoute;
                    targetFrame.className = "absolute inset-0 w-full h-full border-none z-10 animate-fade-in";
                    container.appendChild(targetFrame);
                } else {
                    targetFrame.classList.remove('hidden');
                }
            }

            // GUARDAR ESTADO EN LOCAL STORAGE
            localStorage.setItem('cicos_last_iframe_id', id);
            localStorage.setItem('cicos_last_iframe_route', finalRoute || '../secciones/mods/cco/inicio.html');

            // Cerrar menú lateral al navegar
            window.toggleDrawer(false);
        };

        // Inicializamos eventos base
        window.addEventListener('DOMContentLoaded', () => {
            initClock();
            fetchWeather();
        });
    </script>

    <!-- Script de control de interfaz interactiva para el menú lateral (Trigger único del logo) -->
    <script>
        window.toggleDrawer = (forceState) => {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('drawer-overlay');
            const isOpened = drawer.classList.contains('translate-x-0');
            const shouldOpen = forceState !== undefined ? forceState : !isOpened;

            if (shouldOpen) {
                drawer.classList.remove('-translate-x-full');
                drawer.classList.add('translate-x-0');
                overlay.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                drawer.classList.remove('translate-x-0');
                drawer.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0', 'pointer-events-none');
            }
        };
    </script>

</body>
</html>
